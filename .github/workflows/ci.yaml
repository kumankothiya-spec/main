name: "CI pipeline"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest --log-cli-level=INFO --log-file=pytest.log .\tests\

      - name: Upload PyTest logs
        uses: actions/upload-artifact@v4
        with:
            name: pytest-logs
            path: pytest.log
