name: "CI pipeline"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest --log-cli-level=INFO --log-file=pytest.log -m "smoke"

      - name: Upload PyTest logs
        uses: actions/upload-artifact@v4
        with:
            name: pytest-logs
            path: pytest.log
